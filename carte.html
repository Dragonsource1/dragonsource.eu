<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DragonSource — Carte de visite</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #1c1108;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Raleway', sans-serif;
    padding: 2rem;
  }

  .card {
    width: 420px;
    background: #221408;
    border: 0.5px solid #C8960C44;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 60px #C8170A22, 0 0 120px #00000088;
    animation: fadeIn 0.8s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Gold top border accent */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #E8A010, #C8170A, #E8A010, transparent);
  }

  .card-header {
    padding: 2.5rem 2rem 1.5rem;
    text-align: center;
    border-bottom: 0.5px solid #C8960C22;
    position: relative;
  }

  .logo-img {
    width: 110px;
    height: 110px;
    object-fit: contain;
    margin-bottom: 1rem;
    filter: drop-shadow(0 0 12px #C8170A55);
  }

  .company-name {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #E8A010;
    margin-bottom: 4px;
  }

  .company-name span {
    color: #C8170A;
  }

  .tagline {
    font-size: 11px;
    letter-spacing: 3px;
    color: #C8960C99;
    text-transform: uppercase;
    font-weight: 400;
  }

  .card-body {
    padding: 1.8rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .contact-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    border: 0.5px solid #C8960C18;
    background: #1a0a0011;
    transition: border-color 0.2s, background 0.2s;
    text-decoration: none;
    cursor: pointer;
  }

  .contact-row:hover {
    border-color: #C8960C55;
    background: #C8960C08;
  }

  .icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: #C8170A18;
    border: 0.5px solid #C8170A44;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .icon svg {
    width: 18px;
    height: 18px;
  }

  .contact-info {
    flex: 1;
  }

  .contact-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: #C8960C88;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .contact-value {
    font-size: 14px;
    color: #f0ddb0;
    font-weight: 400;
  }

  .contact-value.placeholder {
    color: #C8960C66;
    font-style: italic;
    font-size: 13px;
  }

  .card-footer {
    padding: 1.2rem 2rem;
    border-top: 0.5px solid #C8960C22;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .expertise {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    border: 0.5px solid #C8960C44;
    color: #C8960C99;
    font-weight: 500;
  }

  .ornament {
    color: #C8170A55;
    font-size: 20px;
    font-family: 'Cinzel', serif;
  }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <img class="logo-img" src="dragonsource_pdp_noir.png" alt="DragonSource logo" onerror="this.style.display='none'"/>
    <div class="company-name">DRAGON<span>SOURCE</span></div>
    <div class="tagline">Sourcing &amp; Trading — Chine · Europe</div>
  </div>

  <div class="card-body">

    <a class="contact-row" href="tel:+32491503938">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#E8A010" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.72A2 2 0 012 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
        </svg>
      </div>
      <div class="contact-info">
        <div class="contact-label">WhatsApp / Téléphone</div>
        <div class="contact-value">+32 491 50 39 38</div>
      </div>
    </a>

    <a class="contact-row" href="mailto:contact.dragonsource@gmail.com">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#E8A010" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <div class="contact-info">
        <div class="contact-label">Email</div>
        <div class="contact-value">contact.dragonsource@gmail.com</div>
      </div>
    </a>

    <a class="contact-row" href="https://tiktok.com/@dragon.source1" target="_blank">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#E8A010" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/>
        </svg>
      </div>
      <div class="contact-info">
        <div class="contact-label">TikTok</div>
        <div class="contact-value">@dragon.source1</div>
      </div>
    </a>

    <a class="contact-row" href="https://t.me/dragonsource1" target="_blank">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#E8A010" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13"/>
          <path d="M22 2L15 22l-4-9-9-4 20-7z"/>
        </svg>
      </div>
      <div class="contact-info">
        <div class="contact-label">Telegram</div>
        <div class="contact-value">@dragonsource1</div>
      </div>
    </a>

    <a class="contact-row" href="https://dragonsource.eu" target="_blank">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#E8A010" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
        </svg>
      </div>
      <div class="contact-info">
        <div class="contact-label">Site web</div>
        <div class="contact-value">dragonsource.eu</div>
      </div>
    </a>

  </div>

  <div class="card-footer">
    <div class="expertise">
      <span class="badge">Électronique</span>
      <span class="badge">Textile</span>
      <span class="badge">Maison & Déco</span>
    </div>
    <div class="ornament">龍</div>
  </div>
</div>
</body>
</html>
